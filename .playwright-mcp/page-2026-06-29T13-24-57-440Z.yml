        - paragraph [ref=e15]: Lietuvių Kalba is a dedicated Lithuanian language school offering structured, communicative courses for all proficiency levels. Whether you are taking your very first steps or deepening existing skills, our experienced teachers will guide you through Lithuania's rich linguistic heritage in a welcoming environment.
        - list "School highlights" [ref=e16]:
